<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Score - Last One Standing</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .history-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }
    .history-row:last-child { border-bottom: none; }
    .history-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--bg3);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .history-pts {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      color: var(--gold);
      margin-left: auto;
    }
    .history-bonus { color: var(--green); }
  </style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="logo-mark">LOS</div>
    <div>
      <div class="site-name">Last One Standing</div>
      <div class="site-sub">My Score</div>
    </div>
    <div style="margin-left:auto">
      <a href="leaderboard.html" class="btn btn-outline btn-sm">Leaderboard</a>
    </div>
  </div>

  <!-- Phone lookup form (shown when not logged in) -->
  <div id="lookup-form">
    <div class="card">
      <p style="font-size:14px;color:var(--text-muted);margin-bottom:1rem">Enter your mobile number to see your points.</p>
      <label>Mobile number</label>
      <input type="tel" id="lookup-phone" placeholder="e.g. 07700 900000" autocomplete="tel"/>
      <div id="lookup-msg" class="msg"></div>
      <button class="btn btn-primary" onclick="lookup()">View my points</button>
    </div>
  </div>

  <!-- Player dashboard (shown after lookup) -->
  <div id="dashboard" style="display:none">

    <div class="card card-gold" style="text-align:center;margin-bottom:1.5rem">
      <div id="player-name" style="font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;margin-bottom:0.25rem"></div>
      <div class="points-big" id="player-total"></div>
      <div class="points-label">total points</div>
      <hr class="divider"/>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center">
        <div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold)" id="stat-rank">—</div>
          <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px">Rank</div>
        </div>
        <div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold)" id="stat-visits">—</div>
          <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px">Check-ins</div>
        </div>
        <div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold)" id="stat-bonus">—</div>
          <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px">Bonus pts</div>
        </div>
      </div>
    </div>

    <!-- Tonight's remaining scans -->
    <div class="card" id="tonight-card" style="margin-bottom:1.5rem">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem">
        <span style="font-size:14px;font-weight:500">Tonight's scans</span>
        <span id="tonight-count" style="font-size:13px;color:var(--text-muted)"></span>
      </div>
      <div class="scan-dots" id="tonight-dots"></div>
      <div style="font-size:12px;color:var(--text-dim);margin-top:0.5rem" id="tonight-msg"></div>
    </div>

    <div class="section-title">Point history</div>

    <div id="history-loading" style="text-align:center;padding:1.5rem;color:var(--text-muted)">
      <span class="spinner"></span>
    </div>
    <div id="history-empty" style="display:none" class="card">
      <p style="color:var(--text-muted);font-size:14px">No check-ins yet. Scan a QR code to earn your first points!</p>
    </div>
    <div id="history-list" class="card" style="display:none;padding:0.5rem 1rem"></div>

    <hr class="divider"/>
    <button class="btn btn-outline" onclick="switchPlayer()" style="font-size:13px">Switch account</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script>
const sb = getSupabase();

const typeIcons = {
  darts:'🎯', pool:'🎱', trivia:'🧠', bingo:'🎰',
  live_music:'🎵', blackjack:'🃏', other:'⭐', bonus:'🏆'
};

async function lookup() {
  const raw = document.getElementById('lookup-phone').value.trim();
  const phone = raw.replace(/\D/g, '');
  if (phone.length < 10) {
    showMsg('lookup-msg', 'Please enter a valid mobile number.', 'error'); return;
  }
  const { data: player } = await sb.from('players').select('*').eq('phone', phone).single();
  if (!player) {
    showMsg('lookup-msg', "We don't have that number. Have you checked in at an event yet?", 'error'); return;
  }
  localStorage.setItem('los_phone', phone);
  await showDashboard(player);
}

async function showDashboard(player) {
  document.getElementById('lookup-form').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('player-name').textContent = player.name;

  // Fetch all check-ins
  const { data: checkins } = await sb
    .from('checkins')
    .select('*, events(name, type)')
    .eq('player_id', player.id)
    .order('scanned_at', { ascending: false });

  // Fetch bonus points
  const { data: bonuses } = await sb
    .from('bonus_points')
    .select('*, events(name)')
    .eq('player_id', player.id)
    .order('awarded_at', { ascending: false });

  const checkinPts = (checkins || []).reduce((s, c) => s + c.points_earned, 0);
  const bonusPts = (bonuses || []).reduce((s, b) => s + b.points, 0);
  const total = checkinPts + bonusPts;

  document.getElementById('player-total').textContent = total;
  document.getElementById('stat-visits').textContent = (checkins || []).length;
  document.getElementById('stat-bonus').textContent = bonusPts;

  // Compute rank (alltime)
  const { data: allPlayers } = await sb.from('players').select('id, total_points').order('total_points', { ascending: false });
  const rank = (allPlayers || []).findIndex(p => p.id === player.id) + 1;
  document.getElementById('stat-rank').textContent = rank > 0 ? `#${rank}` : '—';

  // Tonight's scans (rolling 8h window)
  const windowStart = new Date(Date.now() - VISIT_WINDOW_HOURS * 60 * 60 * 1000);
  const tonightScans = (checkins || []).filter(c => new Date(c.scanned_at) > windowStart);
  const remaining = MAX_SCANS_PER_VISIT - tonightScans.length;
  document.getElementById('tonight-count').textContent = `${tonightScans.length} / ${MAX_SCANS_PER_VISIT}`;
  const dotsEl = document.getElementById('tonight-dots');
  dotsEl.innerHTML = '';
  for (let i = 0; i < MAX_SCANS_PER_VISIT; i++) {
    const d = document.createElement('div');
    d.className = 'scan-dot' + (i < tonightScans.length ? ' used' : '');
    dotsEl.appendChild(d);
  }
  document.getElementById('tonight-msg').textContent =
    remaining > 0 ? `${remaining} scan${remaining !== 1 ? 's' : ''} remaining in the next 8 hours` : 'Max scans reached for this visit window.';

  // History
  document.getElementById('history-loading').style.display = 'none';
  const allHistory = [
    ...(checkins || []).map(c => ({
      type: 'checkin',
      label: c.events?.name || 'Event',
      icon: typeIcons[c.events?.type] || '⭐',
      pts: c.points_earned,
      date: c.scanned_at
    })),
    ...(bonuses || []).map(b => ({
      type: 'bonus',
      label: b.reason || 'Bonus points',
      icon: '🏆',
      pts: b.points,
      date: b.awarded_at
    }))
  ].sort((a, b) => new Date(b.date) - new Date(a.date));

  if (!allHistory.length) {
    document.getElementById('history-empty').style.display = 'block';
    return;
  }

  const list = document.getElementById('history-list');
  list.innerHTML = '';
  allHistory.forEach(item => {
    const d = new Date(item.date);
    const dateStr = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    const row = document.createElement('div');
    row.className = 'history-row';
    row.innerHTML = `
      <div class="history-icon">${item.icon}</div>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:500">${esc(item.label)}</div>
        <div style="font-size:12px;color:var(--text-muted)">${dateStr}</div>
      </div>
      <div class="history-pts ${item.type === 'bonus' ? 'history-bonus' : ''}">+${item.pts}</div>`;
    list.appendChild(row);
  });
  list.style.display = 'block';
}

function switchPlayer() {
  localStorage.removeItem('los_phone');
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('lookup-form').style.display = 'block';
  document.getElementById('lookup-phone').value = '';
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text; el.className = `msg show msg-${type}`;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Auto-load if phone saved
const saved = localStorage.getItem('los_phone');
if (saved) {
  document.getElementById('lookup-phone').value = saved;
  lookup();
}
</script>
</body>
</html>
