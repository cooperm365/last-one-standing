<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Bar Rank</title>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Bar Rank"/>
  <meta name="theme-color" content="#111110"/>
  <link rel="apple-touch-icon" href="/icon-192.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111110;
      --bg2: #1A1A18;
      --bg3: #2A2A28;
      --gold: #F0A500;
      --gold-dim: rgba(240,165,0,0.15);
      --text: #F0EDE8;
      --muted: #888780;
      --dim: #555553;
      --border: #2A2A28;
      --green: #3ECF8E;
      --red: #F56565;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── SPLASH ── */
    #splash {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100;
      transition: opacity 0.4s ease;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    .splash-logo {
      width: 72px; height: 72px;
      background: var(--gold);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px; color: #111;
      margin-bottom: 20px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
    .splash-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 38px; letter-spacing: 3px;
      color: var(--gold);
    }
    .splash-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

    /* ── MAIN ── */
    #main { min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); display: none; }

    /* Header */
    .header {
      padding: 20px 20px 16px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .logo-mark {
      width: 38px; height: 38px;
      background: var(--gold); border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif; font-size: 15px; color: #111;
      flex-shrink: 0;
    }
    .header-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--gold); }
    .header-sub { font-size: 12px; color: var(--muted); }

    /* Sections */
    .section { padding: 20px 20px 0; }
    .section-label {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--muted); margin-bottom: 12px;
    }

    /* Bar cards */
    .bar-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
      text-decoration: none;
      color: inherit;
    }
    .bar-card:active { transform: scale(0.98); }
    .bar-card:hover { border-color: var(--gold); }
    .bar-color-dot {
      width: 44px; height: 44px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .bar-info { flex: 1; min-width: 0; }
    .bar-name { font-size: 16px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-meta { font-size: 12px; color: var(--muted); }
    .bar-pts {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px; color: var(--gold);
      flex-shrink: 0; text-align: right;
    }
    .bar-pts-label { font-size: 10px; color: var(--muted); text-align: right; text-transform: uppercase; letter-spacing: 0.3px; }

    /* Scan CTA */
    .scan-cta {
      margin: 20px;
      background: var(--gold);
      border: none; border-radius: 14px;
      padding: 18px 20px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer; width: calc(100% - 40px);
      transition: opacity 0.15s, transform 0.1s;
    }
    .scan-cta:active { opacity: 0.9; transform: scale(0.98); }
    .scan-icon { font-size: 28px; flex-shrink: 0; }
    .scan-text { text-align: left; }
    .scan-main { font-size: 16px; font-weight: 700; color: #111; }
    .scan-sub { font-size: 12px; color: #444; margin-top: 1px; }
    .scan-arrow { margin-left: auto; font-size: 20px; color: #111; flex-shrink: 0; }

    /* Phone lookup */
    .lookup-card {
      margin: 0 20px 20px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }
    .lookup-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .lookup-sub { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
    .lookup-input {
      width: 100%; background: var(--bg3);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 14px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 16px;
      margin-bottom: 8px;
    }
    .lookup-input:focus { outline: none; border-color: var(--gold); }
    .lookup-btn {
      width: 100%; background: var(--bg3);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 10px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      font-weight: 600; cursor: pointer;
      transition: border-color 0.15s;
    }
    .lookup-btn:hover { border-color: var(--gold); }
    .msg { font-size: 13px; padding: 8px 0; }
    .msg.error { color: var(--red); }
    .msg.success { color: var(--green); }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 40px 20px;
    }
    .empty-emoji { font-size: 48px; margin-bottom: 12px; }
    .empty-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
    .empty-sub { font-size: 14px; color: var(--muted); line-height: 1.6; }
  </style>
</head>
<body>

<!-- Splash screen -->
<div id="splash">
  <div class="splash-logo">BR</div>
  <div class="splash-name">BAR RANK</div>
  <div class="splash-sub">Loading your bars...</div>
</div>

<!-- Main content -->
<div id="main">

  <!-- Header -->
  <div class="header">
    <div class="logo-mark">BR</div>
    <div>
      <div class="header-title">BAR RANK</div>
      <div class="header-sub" id="greeting">Welcome back</div>
    </div>
  </div>

  <!-- Scan CTA — always visible at top -->
  <button class="scan-cta" onclick="openScanner()">
    <div class="scan-icon">📷</div>
    <div class="scan-text">
      <div class="scan-main">Scan a QR code</div>
      <div class="scan-sub">Point your camera at any game table</div>
    </div>
    <div class="scan-arrow">→</div>
  </button>

  <!-- My Bars section — shown if player found -->
  <div id="my-bars-section" style="display:none">
    <div class="section">
      <div class="section-label">My bars</div>
      <div id="bar-list"></div>
    </div>
  </div>

  <!-- Phone lookup — shown if no player saved -->
  <div id="lookup-section" style="display:none">
    <div class="lookup-card">
      <div class="lookup-title">Find your score</div>
      <div class="lookup-sub">Enter your mobile number to see your points</div>
      <input type="tel" class="lookup-input" id="lookup-phone" placeholder="555-000-0000" autocomplete="tel"/>
      <div id="lookup-msg" class="msg"></div>
      <button class="lookup-btn" onclick="lookup()">View my score →</button>
    </div>
  </div>

  <!-- Empty state — first time user -->
  <div id="empty-section" style="display:none">
    <div class="empty-state">
      <div class="empty-emoji">🎯</div>
      <div class="empty-title">You're not on any boards yet</div>
      <div class="empty-sub">Scan a QR code at a game table to join the competition at your bar. No app needed — takes 10 seconds.</div>
    </div>
  </div>

</div>

<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function init() {
  // Check for saved phone
  const savedPhone = localStorage.getItem('br_phone');

  if (savedPhone) {
    await loadPlayerBars(savedPhone);
  } else {
    // Show lookup form
    document.getElementById('lookup-section').style.display = 'block';
    document.getElementById('empty-section').style.display = 'block';
  }

  // Hide splash
  setTimeout(() => {
    document.getElementById('splash').classList.add('hidden');
    document.getElementById('main').style.display = 'block';
  }, 800);
}

async function loadPlayerBars(phone) {
  const normalizedPhone = phone.replace(/\D/g, '');

  // Get player profile
  const { data: profile } = await sb
    .from('player_profiles')
    .select('id, name, nickname, avatar')
    .eq('phone', normalizedPhone)
    .single();

  if (!profile) {
    document.getElementById('lookup-section').style.display = 'block';
    document.getElementById('empty-section').style.display = 'block';
    return;
  }

  // Greeting
  const displayName = profile.nickname || profile.name.split(' ')[0];
  document.getElementById('greeting').textContent = `Hey ${displayName} 👋`;

  // Get all bar scores for this player
  const { data: scores } = await sb
    .from('player_bar_scores')
    .select('total_points, lifetime_points, bar_id, bars(id, name, slug, accent_color, point_target, logo_url)')
    .eq('player_id', profile.id)
    .order('total_points', { ascending: false });

  if (!scores?.length) {
    document.getElementById('empty-section').style.display = 'block';
    return;
  }

  // Render bar cards
  const list = document.getElementById('bar-list');
  list.innerHTML = scores.map(s => {
    const bar = s.bars;
    if (!bar) return '';
    const color = '#' + (bar.accent_color || 'F0A500');
    const initials = bar.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    const pct = bar.point_target ? Math.min(100, Math.round((s.total_points / bar.point_target) * 100)) : 0;

    return `<a class="bar-card" href="my-points.html?bar=${bar.slug}">
      <div class="bar-color-dot" style="background:${color}22;border:1px solid ${color}44">
        ${bar.logo_url
          ? `<img src="${bar.logo_url}" style="width:28px;height:28px;object-fit:contain;border-radius:4px"/>`
          : `<span style="font-family:'Bebas Neue',sans-serif;font-size:14px;color:${color}">${initials}</span>`}
      </div>
      <div class="bar-info">
        <div class="bar-name">${esc(bar.name)}</div>
        <div class="bar-meta">
          <span style="color:${color}">${pct}%</span> to target
          · ${s.lifetime_points || s.total_points} lifetime pts
        </div>
        <!-- Mini progress bar -->
        <div style="height:3px;background:var(--bg3);border-radius:999px;margin-top:6px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${color};border-radius:999px;transition:width 0.5s"></div>
        </div>
      </div>
      <div>
        <div class="bar-pts" style="color:${color}">${s.total_points}</div>
        <div class="bar-pts-label">pts</div>
      </div>
    </a>`;
  }).join('');

  document.getElementById('my-bars-section').style.display = 'block';
  localStorage.setItem('br_phone', normalizedPhone);
}

async function lookup() {
  const raw = document.getElementById('lookup-phone').value.trim();
  const phone = raw.replace(/\D/g, '');
  if (phone.length < 10) {
    showMsg('lookup-msg', 'Please enter a valid mobile number.', 'error');
    return;
  }
  showMsg('lookup-msg', 'Looking up...', '');
  await loadPlayerBars(phone);
  if (document.getElementById('my-bars-section').style.display === 'none') {
    showMsg('lookup-msg', "We don't have that number yet. Scan a QR code to get started.", 'error');
  } else {
    document.getElementById('lookup-section').style.display = 'none';
    document.getElementById('empty-section').style.display = 'none';
  }
}

function openScanner() {
  // Check if they have a saved bar slug — go to checkin with that bar
  const slug = localStorage.getItem('br_bar_slug');
  if (slug) {
    // Go to camera — user scans at whatever table they're at
    alert('Point your phone camera at any QR code card on a game table. The link opens automatically.');
  } else {
    alert('Point your phone camera at any QR code card on a game table. The link opens automatically.');
  }
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  el.className = 'msg ' + type;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Update manifest start_url to point here
// Run init
init();

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>

</body>
</html>
